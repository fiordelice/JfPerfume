<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfume JF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="jf.jpeg" alt="JF" class="navbar-logo" />
        <div>
       
        </div>
      </div>

      <label class="search-box" for="searchInput">
        <span>🔎</span>
        <input id="searchInput" type="search" placeholder="Buscar perfume" />
      </label>
    </header>

    <main class="page-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Loja</p>
          <h1>Perfumes elegantes para seu dia a dia</h1>
          <p>Escolha seu aroma, adicione ao carrinho e finalize a compra com facilidade.</p>
        </div>
      </section>

      <button class="hero-btn" id="cartBtn">
        <span class="cart-icon">🛒</span>
        <span class="cart-count" id="cartCount">0</span>
      </button>

      <section class="products-section">
        <div id="productsGrid" class="products-grid"></div>
      </section>
    </main>

    <aside class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <div>
          <h2>Seu Carrinho</h2>
          <p class="cart-subtitle">Confira seus itens antes de finalizar.</p>
        </div>
        <button class="cart-close" id="cartClose">×</button>
      </div>
      <div class="cart-items" id="cartItems"></div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total</span>
          <strong id="cartTotal">R$ 0,00</strong>
        </div>
        <button class="btn-checkout" id="checkoutBtn">Finalizar Pedido</button>
        <button class="btn-clear-cart" id="clearCartBtn">Limpar Carrinho</button>
      </div>
    </aside>

    <div class="cart-overlay" id="cartOverlay"></div>

    <footer class="footer">
      <div class="footer-content">
        <div>
          <img src="jf.jpeg" alt="JF Logo" class="footer-logo" />
        </div>
      </div>
      <p class="footer-note">Desenvolvido por Gabriella Fiordelice <br> © 2026</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
